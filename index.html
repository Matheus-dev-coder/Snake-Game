<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="shortcut icon" href="icon/IconeSnake.ico" type="image/x-icon">
    <title>Document</title>

<body>
    <h1>🐍 Snake - Game </h1>

    <div class="info">
       <h2>Score: <span id="score">0</span></h2>
       <h2>Recorde: <span id="record">0</span></h2>
    </div>

    <canvas id="baseGame" width="600" height="600" style="border: 1px solid black;">
          
    </canvas>

    <div id="gameOver">
       <h1>💀 GAME OVER 💀</h1>
       <h2>Score: <span id="scoreFinal"></span></h2>
       <h2>Recorde: <span id="recordeFinal">0</span></h2>
       <button id="reiniciar">Jogar Novamente</button>
    </div>

    <footer>
       <div class="perfil"> 
          <h3>Desenvolvido por:</h3>
          <a href="https://github.com/Matheus-dev-coder">Matheus-dev.</a>
          <video src="perfil_midia/videoPerfil.mp4" controls loop autoplay  ></video>
       </div>
    </footer>

    <script src="Script.js"></script>
